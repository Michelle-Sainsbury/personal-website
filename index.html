<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelle Sainsbury | Nonprofit Executive Leader</title>
<meta name="description" content="Michelle Sainsbury — nonprofit executive leader combining two decades of housing and human services leadership with emerging technology skills to create lasting community impact.">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --navy:#12355B;
    --navy-deep:#0b2440;
    --teal:#2A9D8F;
    --teal-dark:#217a70;
    --gold:#E9C46A;
    --off-white:#F8F9FA;
    --charcoal:#343A40;
    --line:#E1E5E9;
    --max:1180px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--off-white);
    color:var(--charcoal);
    font-family:'Inter',sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces',serif;
    color:var(--navy);
    margin:0;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--teal-dark);
    font-weight:500;
  }
  a{color:inherit;}
  img{max-width:100%;display:block;}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 32px;}
  section{scroll-margin-top:84px;}

  /* Accessibility: focus states */
  a:focus-visible, button:focus-visible{
    outline:3px solid var(--teal);
    outline-offset:3px;
    border-radius:4px;
  }
  .skip-link{
    position:absolute; left:-999px; top:0;
    background:var(--navy); color:#fff; padding:12px 20px;
    z-index:200; border-radius:0 0 6px 0;
  }
  .skip-link:focus{left:0;}

  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  /* ===== NAV ===== */
  header{
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(18,53,91,0.97);
    backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .nav-inner{
    max-width:var(--max); margin:0 auto; padding:0 32px;
    display:flex; align-items:center; justify-content:space-between;
    height:72px;
  }
  .brand{
    font-family:'Fraunces',serif; color:#fff; font-size:1.15rem;
    font-weight:600; text-decoration:none; letter-spacing:0.01em;
  }
  .brand span{color:var(--gold);}
  nav ul{
    display:flex; gap:2px; list-style:none; margin:0; padding:0;
  }
  nav a{
    color:rgba(255,255,255,0.78); text-decoration:none;
    font-size:0.91rem; font-weight:500; padding:10px 14px;
    border-radius:6px; transition:color .2s ease, background .2s ease;
    display:block;
  }
  nav a:hover{color:#fff; background:rgba(255,255,255,0.06);}
  nav a.active{color:var(--gold);}
  .nav-toggle{
    display:none; background:none; border:0; cursor:pointer;
    width:44px; height:44px; position:relative;
  }
  .nav-toggle span, .nav-toggle::before, .nav-toggle::after{
    content:''; position:absolute; left:11px; right:11px; height:2px;
    background:#fff; transition:transform .25s ease, opacity .25s ease;
  }
  .nav-toggle::before{top:16px;}
  .nav-toggle span{top:22px;}
  .nav-toggle::after{top:28px;}
  .nav-toggle.open::before{transform:translateY(6px) rotate(45deg);}
  .nav-toggle.open::after{transform:translateY(-6px) rotate(-45deg);}
  .nav-toggle.open span{opacity:0;}

  @media (max-width:880px){
    nav{
      position:fixed; top:72px; left:0; right:0; bottom:0;
      background:var(--navy-deep);
      transform:translateX(100%);
      transition:transform .3s ease;
      overflow-y:auto;
    }
    nav.open{transform:translateX(0);}
    nav ul{flex-direction:column; padding:24px 32px; gap:4px;}
    nav a{font-size:1.05rem; padding:14px 10px;}
    .nav-toggle{display:block;}
  }

  /* ===== HERO ===== */
  .hero{
    padding:170px 0 110px;
    background:
      radial-gradient(ellipse 900px 500px at 85% -10%, rgba(233,196,106,0.18), transparent 60%),
      linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
    color:#fff;
    position:relative;
    overflow:hidden;
  }
  .hero-inner{
    display:grid; grid-template-columns:1.15fr 0.85fr; gap:64px; align-items:center;
  }
  .hero-eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:0.75rem; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--gold); margin-bottom:18px; font-weight:500;
  }
  .hero h1{
    color:#fff; font-size:clamp(2.3rem, 4.4vw, 3.6rem); line-height:1.08;
    font-weight:600; margin-bottom:24px;
  }
  .hero p.lede{

    margin-bottom:36px; font-weight:400;
  }
  .cta-row{display:flex; gap:16px; flex-wrap:wrap;}
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:14px 26px; border-radius:8px; font-weight:600; font-size:0.96rem;
    text-decoration:none; transition:transform .18s ease, box-shadow .18s ease, background .2s ease;
    border:1.5px solid transparent; cursor:pointer;
  }
  .btn-primary{background:var(--teal); color:#fff;}
  .btn-primary:hover{background:var(--teal-dark); transform:translateY(-2px); box-shadow:0 10px 24px rgba(42,157,143,0.35);}
  .btn-ghost{border-color:rgba(255,255,255,0.35); color:#fff;}
  .btn-ghost:hover{background:rgba(255,255,255,0.08); transform:translateY(-2px);}

  .hero-portrait{
    aspect-ratio:4/5; border-radius:16px;
    background:
      linear-gradient(155deg, rgba(233,196,106,0.25), transparent 55%),
      linear-gradient(200deg, var(--teal) 0%, var(--navy-deep) 100%);
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
    box-shadow:0 30px 60px rgba(0,0,0,0.35);
    border:1px solid rgba(255,255,255,0.12);
  }
  .hero-portrait .initials{
    font-family:'Fraunces',serif; font-size:5.5rem; color:rgba(255,255,255,0.92);
    font-weight:600;
  }
  .hero-portrait .caption{
    position:absolute; bottom:0; left:0; right:0; padding:16px 20px;
    background:linear-gradient(0deg, rgba(11,36,64,0.85), transparent);
    font-family:'IBM Plex Mono',monospace; font-size:0.7rem; letter-spacing:0.06em;
    color:rgba(255,255,255,0.75);
  }

  /* ===== SECTION SCAFFOLDING ===== */
  .section{padding:100px 0;}
  .section-head{max-width:640px; margin-bottom:56px;}
  .section-head h2{font-size:clamp(1.8rem,3vw,2.5rem); margin-top:10px; line-height:1.15;}
  .section-head p{font-size:1.05rem; color:#555; margin-top:16px;}
  .alt-bg{background:#fff;}

  /* ===== STORY TIMELINE ===== */
  .timeline{position:relative; margin-top:20px;}
  .timeline::before{
    content:''; position:absolute; left:23px; top:8px; bottom:8px; width:2px;
    background:linear-gradient(180deg, var(--teal), var(--gold));
  }
  .t-item{
    position:relative; padding-left:70px; margin-bottom:52px;
  }
  .t-item:last-child{margin-bottom:0;}
  .t-marker{
    position:absolute; left:0; top:0; width:48px; height:48px; border-radius:50%;
    background:var(--navy); border:3px solid var(--off-white);
    box-shadow:0 0 0 2px var(--teal);
    display:flex; align-items:center; justify-content:center;
  }
  .t-marker svg{width:20px; height:20px; stroke:var(--gold); fill:none; stroke-width:2;}
  .t-item h3{font-size:1.3rem; margin-bottom:8px;}
  .t-label{font-family:'IBM Plex Mono',monospace; font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal-dark); font-weight:500; display:block; margin-bottom:6px;}
  .t-item p{color:#4a4f54; max-width:66ch; margin:0 0 8px;}
  .t-item .lesson{
    font-size:0.94rem; color:var(--navy); background:#EEF3F0; border-left:3px solid var(--teal);
    padding:10px 16px; border-radius:0 6px 6px 0; margin-top:12px;
  }
